{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="user-layout">
  <header class="user-topbar">
    <div class="topbar-left">
      <div class="topbar-logo icon-home-topbar"></div>
      <div>
        <h1 class="topbar-title">Edit Profile</h1>
        <p class="topbar-subtitle">Update your account details</p>
      </div>
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn-logout-compact">Back to Dashboard</a>
  </header>

  <div class="user-container" style="justify-content: center; margin-top: 2rem;">
    <main class="user-main" style="max-width: 600px; width: 100%;">
      <div class="content-card">
        <h2 class="content-title">Account Details</h2>
        
        <form method="POST" action="{{ url_for('edit_profile') }}" class="assign-work-form-compact">
          <div class="form-group">
            <label for="username">Username *</label>
            <input type="text" id="username" name="username" value="{{ user.username }}" required />
          </div>
          
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" required />
          </div>
          
          <div class="form-group" style="margin-top: 1rem;">
            <label for="password">New Password (leave blank to keep current)</label>
            <input type="password" id="password" name="password" placeholder="Enter new password if changing" />
          </div>
          
          <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn--primary">Save Changes</button>
            <a href="{{ url_for('dashboard') }}" class="btn" style="background-color: var(--border-color); color: var(--text-primary); text-decoration: none; display: inline-block; text-align: center;">Cancel</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>
{% endblock %}
