{% extends "base.html" %}
{% block title %}Create Course{% endblock %}

{% block content %}
<div class="user-layout">
  <header class="user-topbar">
    <div class="topbar-left">
      <div class="topbar-logo icon-home-topbar"></div>
      <div>
        <h1 class="topbar-title">Create Course</h1>
        <p class="topbar-subtitle">Share your knowledge</p>
      </div>
    </div>
    <div style="display: flex; gap: 10px;">
      <a href="{{ url_for('my_created_courses') }}" class="btn-logout-compact" style="background-color: var(--primary-color);">My Courses</a>
      <a href="{{ url_for('dashboard') }}" class="btn-logout-compact">Dashboard</a>
    </div>
  </header>

  <div class="user-container" style="display: block;">
    <main class="user-main" style="max-width: 800px; margin: 0 auto; width: 100%;">
      <div class="content-card">
        <h2 class="content-title">Course Details</h2>
        <form method="POST">
          <div class="form-group">
            <label for="title">Course Title *</label>
            <input type="text" id="title" name="title" placeholder="e.g. Mastering Flask" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;" />
          </div>
          
          <div class="form-group" style="margin-top: 1.5rem;">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="5" placeholder="What will students learn?" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;"></textarea>
          </div>

          <div class="form-group" style="margin-top: 1.5rem;">
            <label for="thumbnail_url">Thumbnail URL (optional)</label>
            <input type="text" id="thumbnail_url" name="thumbnail_url" placeholder="https://example.com/image.jpg" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;" />
          </div>
          
          <button type="submit" class="btn-punch btn-punch-in" style="width: 100%; margin-top: 2rem; font-size: 1.1rem;">Create Course & Continue</button>
        </form>
      </div>
    </main>
  </div>
</div>
{% endblock %}
